name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Add 404 page for SPA routing
        run: cp ./dist/index.html ./dist/404.html

      - name: Stamp HTML (unique bytes each deploy → new ETag, fewer stale shells)
        run: |
          STAMP="<!-- gh-pages ${{ github.run_id }} ${{ github.sha }} -->"
          printf '\n%s\n' "$STAMP" >> ./dist/index.html
          printf '\n%s\n' "$STAMP" >> ./dist/404.html

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
